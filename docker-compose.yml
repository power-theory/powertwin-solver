services:
  powertwin-solver-pg:
    image: postgres:17
    container_name: powertwin-solver-pg
    environment:
      - POSTGRES_DB=powertwin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_DB_TOKEN_ADMIN}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      powertwin-network:
        aliases:
          - postgres-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d powertwin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      powertwin-solver-flask:
        condition: service_healthy

  powertwin-solver-flask:
    container_name: powertwin-solver-flask
    build:
      context: ./solver
      args:
        - DEV_MODE=${DEV_MODE:-false}
    command:
      - sh
      - -c
      - |
        sleep 30
        if [ "$$DEV_MODE" = "true" ]; then
          exec python run.py
        else
          exec gunicorn -w 2 -b 0.0.0.0:8080 --access-logfile - --error-logfile - run:app
        fi
    ports:
      - "${FLASK_PORT}:8080"
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
    healthcheck:
      test: exit 0
    environment:
      - DEV_MODE=${DEV_MODE:-false}
      - FLASK_MSS_BASE_URL=${FLASK_MSS_BASE_URL:-}
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
      - API_SOLVER_TOKEN=${API_SOLVER_TOKEN}
      - CI_COMMIT_BRANCH=${CI_COMMIT_BRANCH:-}
      - PGHOST=postgres-db
      - PGPORT=${PG_DB_PORT}
      - PGUSER=postgres
      - PGPASSWORD=${PG_DB_TOKEN_ADMIN}
      - PGDATABASE=powertwin
      - URBANOPT_REPORTING_FREQUENCY=${URBANOPT_REPORTING_FREQUENCY:-Timestep}
      - URBANOPT_RESAMPLE=${URBANOPT_RESAMPLE:-}
      - URBANOPT_POSTPROCESS_TRANSLATIONS=${URBANOPT_POSTPROCESS_TRANSLATIONS:-false}
      - URBANOPT_SIMULATION_YEAR=${URBANOPT_SIMULATION_YEAR:-2025}
    tty: true
    restart: unless-stopped
    networks:
      - powertwin-network

volumes:
  powertwin-solver-flask:
  postgres_data:
  powertwin_data:

networks:
  powertwin-network:
    name: powertwin-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_dns: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"