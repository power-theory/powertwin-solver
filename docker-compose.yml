services:
  powertwin-solver:
    container_name: powertwin-solver
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./app/powertwin_data:/app/powertwin-db
    depends_on:
      - powertwin-db
    tty: true 


  powertwin-db:
    image: postgres:latest
    container_name: powertwin-db
    environment:
      POSTGRES_DB: powertwin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./app/powertwin_data:/app/powertwin-db
      - postgres_data:/var/lib/postgresql/data

volumes:
  powertwin-solver:
  postgres_data:
  powertwin_data: