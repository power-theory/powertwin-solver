stages:
  # Development stages
  - deploy_dev_db
  - deploy_dev_pgbouncer
  - deploy_dev_flask
  - deploy_dev_mss

  # Preview stages
  - deploy_prev_db
  - deploy_prev_pgbouncer
  - deploy_prev_flask
  - deploy_prev_mss

  # Production stages
  - deploy_main_db
  - deploy_main_pgbouncer
  - deploy_main_flask
  - deploy_main_mss

  # Demo stages
  # - deploy_demo_db
  # - deploy_demo_pgbouncer
  # - deploy_demo_flask
  # - deploy_demo_mss

  # Public stages
  - deploy_public_db
  - deploy_public_pgbouncer
  - deploy_public_flask
  - deploy_public_mss

variables:
  # .env.local — Mode
  DEV_MODE: $DEV_MODE

  # .env.local — Postgres
  PG_DB_TOKEN_ADMIN: $PG_DB_TOKEN_ADMIN
  API_SOLVER_TOKEN: $API_SOLVER_TOKEN
  PG_DB_PORT: $PG_DB_PORT
  PGBOUNCER_PORT: $PGBOUNCER_PORT

  # .env.local — Flask
  FLASK_PORT: $FLASK_PORT

  # .env.local — Simulation
  URBANOPT_SIMULATION_YEAR: $URBANOPT_SIMULATION_YEAR
  URBANOPT_REPORTING_FREQUENCY: $URBANOPT_REPORTING_FREQUENCY
  URBANOPT_RESAMPLE: $URBANOPT_RESAMPLE
  URBANOPT_POSTPROCESS_TRANSLATIONS: $URBANOPT_POSTPROCESS_TRANSLATIONS
  URBANOPT_DYNAMIC_DEFAULTS: $URBANOPT_DYNAMIC_DEFAULTS
  URBANOPT_STOCHASTIC_SAMPLING: $URBANOPT_STOCHASTIC_SAMPLING

  # .env.local — MSS
  MSS_PORT: $MSS_PORT
  MSS_SLACK_VERIFICATION_TOKEN: $MSS_SLACK_VERIFICATION_TOKEN
  MSS_SLACK_SIGNING_SECRET: $MSS_SLACK_SIGNING_SECRET
  MSS_SLACK_WEBHOOK_URL: $MSS_SLACK_WEBHOOK_URL
  MSS_SLACK_CHANNEL: $MSS_SLACK_CHANNEL

  # .env.local — Other
  POWERTWIN_LOG_DIR: $POWERTWIN_LOG_DIR

  # Disable Logic
  PG_DB_DISABLE_DEPLOY: $PG_DB_DISABLE_DEPLOY

  # Container Name Elements
  NAME_PREFIX: ${CI_COMMIT_BRANCH}-
  NAME_SUFFIX_DB: pg
  NAME_SUFFIX_PGBOUNCER: pgbouncer
  NAME_SUFFIX_FLASK: flask
  NAME_SUFFIX_MSS: mss

  # Registry
  REGISTRY: 100.72.180.45:5000

  # Project Name
  PROJECT_NAME: ${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}

  # Environment Names
  ENVIRONMENT_NAME_DB: ${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_DB}
  ENVIRONMENT_NAME_PGBOUNCER: ${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_PGBOUNCER}
  ENVIRONMENT_NAME_FLASK: ${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_FLASK}
  ENVIRONMENT_NAME_MSS: ${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_MSS}

  # Environment URLs
  ENVIRONMENT_URL_DB: https://${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_DB}.${DOMAIN_NAME}:${BALANCER_PORT}
  ENVIRONMENT_URL_PGBOUNCER: https://${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_PGBOUNCER}.${DOMAIN_NAME}:${BALANCER_PORT}
  ENVIRONMENT_URL_FLASK: https://${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_FLASK}.${DOMAIN_NAME}:${BALANCER_PORT}
  ENVIRONMENT_URL_MSS: https://${CI_COMMIT_BRANCH}-${CI_PROJECT_NAME}-${NAME_SUFFIX_MSS}.${DOMAIN_NAME}:${BALANCER_PORT}

  # Local FLASK base URL
  FLASK_MSS_BASE_URL: http://$ENVIRONMENT_NAME_MSS
  MSS_FLASK_BASE_URL: http://$ENVIRONMENT_NAME_FLASK

.deploy_db_template: &deploy_db_template
  script:
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml down --volumes --remove-orphans powertwin-solver-pg
    - echo "Building Docker image for DB in $CI_COMMIT_BRANCH environment..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml build --force-rm --no-cache powertwin-solver-pg
    - echo "Deploying DB Docker container to $CI_COMMIT_BRANCH environment..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml up -d powertwin-solver-pg
    - echo "DB Deployed @ ${ENVIRONMENT_URL_DB}"
  after_script:
    - docker image prune -f
    - docker builder prune -af
    - echo "DB deployment to $CI_COMMIT_BRANCH complete"
  when: on_success

.deploy_pgbouncer_template: &deploy_pgbouncer_template
  script:
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml down --volumes --remove-orphans powertwin-solver-pgbouncer
    - echo "Pulling PgBouncer image from registry..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml pull powertwin-solver-pgbouncer || docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml build --force-rm powertwin-solver-pgbouncer
    - echo "Deploying PgBouncer Docker container to $CI_COMMIT_BRANCH environment..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml up -d powertwin-solver-pgbouncer
    - echo "PgBouncer Deployed @ ${ENVIRONMENT_URL_PGBOUNCER}"
  after_script:
    - docker image prune -f
    - docker builder prune -af
    - echo "PgBouncer deployment to $CI_COMMIT_BRANCH complete"
  when: on_success

.deploy_flask_template: &deploy_flask_template
  script:
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml down --volumes --remove-orphans powertwin-solver-flask
    - echo "Pulling Flask image from registry..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml pull powertwin-solver-flask || docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml build --force-rm powertwin-solver-flask
    - echo "Deploying FLASK Docker container to $CI_COMMIT_BRANCH environment..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml up -d powertwin-solver-flask
    - echo "FLASK Deployed @ ${ENVIRONMENT_URL_FLASK}"
  after_script:
    - docker image prune -f
    - docker builder prune -af
    - echo "FLASK deployment to $CI_COMMIT_BRANCH complete"
  when: on_success

.deploy_mss_template: &deploy_mss_template
  script:
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml down --volumes --remove-orphans powertwin-solver-mss
    - echo "Pulling MSS image from registry..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml pull powertwin-solver-mss || docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml build --force-rm powertwin-solver-mss
    - echo "Deploying Microservices Docker container to $CI_COMMIT_BRANCH environment..."
    - docker-compose -p $PROJECT_NAME -f docker-compose-prod.yml up -d --no-deps powertwin-solver-mss
    - echo "Microservices Deployed @ ${ENVIRONMENT_URL_MSS}"
  after_script:
    - docker image prune -f
    - docker builder prune -af
    - echo "Microservices deployment to $CI_COMMIT_BRANCH complete"
  when: on_success

# Development Environment
deploy_dev_db:
  stage: deploy_dev_db
  tags:
    - dev
  variables:
    FLASK_PORT: 5463
    PG_DB_PORT: 5353
    PGBOUNCER_PORT: 5363
    MSS_PORT: 5813
    PG_DB_COLLECTION_ID: 1
  <<: *deploy_db_template
  environment:
    name: $ENVIRONMENT_NAME_DB
    url: $ENVIRONMENT_URL_DB
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $PG_DB_DISABLE_DEPLOY != "true"'

