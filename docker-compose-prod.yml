services:
  powertwin-solver-pg:
    image: postgres:17
    container_name: ${NAME_PREFIX:-}powertwin-solver-pg
    environment:
      - POSTGRES_DB=powertwin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_DB_TOKEN_ADMIN}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
      - ./postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      default:
        aliases:
          - postgres-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d powertwin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  powertwin-solver-pgbouncer:
    image: ${REGISTRY:-100.72.180.45:5000}/powertwin-solver-pgbouncer:${CI_COMMIT_BRANCH:-dev}
    build: ./pgbouncer
    container_name: ${NAME_PREFIX:-}powertwin-solver-pgbouncer
    environment:
      - DATABASES_HOST=postgres-db
      - DATABASES_PORT=5432
      - DATABASES_USER=postgres
      - DATABASES_PASSWORD=${PG_DB_TOKEN_ADMIN}
      - DATABASES_DBNAME=powertwin
      - LISTEN_ADDR=0.0.0.0
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
      - MAX_DB_CONNECTIONS=100
      - ADMIN_USERS=postgres
      - STATS_USERS=postgres
      - LOG_CONNECTIONS=1
      - LOG_DISCONNECTIONS=1
      - LOG_POOLER_ERRORS=1
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,application_name
    ports:
      - "${PGBOUNCER_PORT}:6432"
    restart: always
    networks:
      default:
        aliases:
          - pgbouncer-db
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  powertwin-solver-flask:
    image: ${REGISTRY:-100.72.180.45:5000}/powertwin-solver-flask:${CI_COMMIT_BRANCH:-dev}
    container_name: ${NAME_PREFIX:-}powertwin-solver-flask
    build:
      context: ./solver
      args:
        - DEV_MODE=${DEV_MODE:-false}
    command:
      - sh
      - -c
      - |
        sleep 30
        if [ "$$DEV_MODE" = "true" ]; then
          exec python run.py
        else
          exec gunicorn -w 2 -b 0.0.0.0:8080 --access-logfile - --error-logfile - run:app
        fi
    ports:
      - "${FLASK_PORT}:8080"
    environment:
      - DEV_MODE=${DEV_MODE:-false}
      - FLASK_MSS_BASE_URL=${FLASK_MSS_BASE_URL:-}
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
      - API_SOLVER_TOKEN=${API_SOLVER_TOKEN}
      - CI_COMMIT_BRANCH=${CI_COMMIT_BRANCH:-}
      - PGHOST=pgbouncer-db
      - PGPORT=6432
      - PGUSER=postgres
      - PGPASSWORD=${PG_DB_TOKEN_ADMIN}
      - PGDATABASE=powertwin
      - URBANOPT_REPORTING_FREQUENCY=${URBANOPT_REPORTING_FREQUENCY:-Timestep}
      - URBANOPT_RESAMPLE=${URBANOPT_RESAMPLE:-}
      - URBANOPT_POSTPROCESS_TRANSLATIONS=${URBANOPT_POSTPROCESS_TRANSLATIONS:-false}
      - URBANOPT_SIMULATION_YEAR=${URBANOPT_SIMULATION_YEAR:-2025}
      - URBANOPT_DYNAMIC_DEFAULTS=${URBANOPT_DYNAMIC_DEFAULTS:-false}
      - URBANOPT_KEEP_RUN_DIR=${URBANOPT_KEEP_RUN_DIR:-false}
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
    healthcheck:
      test: exit 0
    tty: true
    restart: unless-stopped
    networks:
      - default

  powertwin-solver-mss:
    image: ${REGISTRY:-100.72.180.45:5000}/powertwin-solver-mss:${CI_COMMIT_BRANCH:-dev}
    container_name: ${NAME_PREFIX:-}powertwin-solver-mss
    build:
      context: ./mss
      args:
        - DEV_MODE=${DEV_MODE:-false}
    ports:
      - "${MSS_PORT}:8080"
    environment:
      - DEV_MODE=${DEV_MODE:-false}
      - MSS_FLASK_BASE_URL=${MSS_FLASK_BASE_URL}
      - MSS_SLACK_VERIFICATION_TOKEN=${MSS_SLACK_VERIFICATION_TOKEN}
      - MSS_SLACK_SIGNING_SECRET=${MSS_SLACK_SIGNING_SECRET}
      - MSS_SLACK_WEBHOOK_URL=${MSS_SLACK_WEBHOOK_URL}
      - MSS_SLACK_CHANNEL=${MSS_SLACK_CHANNEL}
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
      - API_SOLVER_TOKEN=${API_SOLVER_TOKEN}
      - FLASK_PORT=${FLASK_PORT}
    restart: unless-stopped
    networks:
      - default

volumes:
  powertwin-solver-flask:
  postgres_data:
  powertwin_data:

networks:
  default:
    name: gitlab-network
    external: true