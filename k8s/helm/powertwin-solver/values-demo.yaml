# demo environment to namespace powertwin-demo
global:
  branch: demo
  imageTag: demo

ingress:
  flask:
    host: demo-solver.powertwin.io
  mss:
    host: demo-solver-mss.powertwin.io

secrets:
  pgAdminToken: ""
  apiSolverToken: ""
  slackVerificationToken: ""
  slackSigningSecret: ""
  slackWebhookUrl: ""

pg:
  persistence:
    size: 50Gi

pgbouncer:
  image:
    tag: demo
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1

flask:
  image:
    tag: demo
  replicas: 1
  nodeSelector:
    workload: solver
  tolerations:
    - key: workload
      operator: Equal
      value: solver
      effect: NoSchedule
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  terminationGracePeriodSeconds: 14400
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilization: 80

mss:
  image:
    tag: demo
  replicas: 1
