{{- $component := "flask" }}
{{- $name := include "solver.componentName" (dict "ctx" . "component" $component) }}
{{- $pgbouncerName := include "solver.componentName" (dict "ctx" . "component" "pgbouncer") }}
{{- $mssName := include "solver.componentName" (dict "ctx" . "component" "mss") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "solver.labels" . | nindent 4 }}
    {{- include "solver.selectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  {{- if not (or .Values.flask.hpa.enabled .Values.flask.keda.enabled) }}
  replicas: {{ .Values.flask.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "solver.selectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  # Solver jobs are long-running; never run two image versions over the same work at once.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "solver.labels" . | nindent 8 }}
        {{- include "solver.selectorLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        # Tell Karpenter never to evict/consolidate a solver pod mid-simulation
        karpenter.sh/do-not-disrupt: "true"
    spec:
      terminationGracePeriodSeconds: {{ .Values.flask.terminationGracePeriodSeconds }}
      {{- with .Values.flask.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.flask.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.flask.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: flask
          image: {{ include "solver.image" (dict "ctx" . "image" .Values.flask.image) }}
          imagePullPolicy: {{ .Values.flask.imagePullPolicy }}
          # Mirrors the compose command: brief settle, then gunicorn (prod) or run.py (dev).
          command:
            - sh
            - -c
            - |
              sleep 30
              if [ "$DEV_MODE" = "true" ]; then
                exec python run.py
              else
                exec gunicorn -w {{ .Values.flask.gunicornWorkers }} -b 0.0.0.0:{{ .Values.flask.port }} --access-logfile - --error-logfile - run:app
              fi
          ports:
            - name: http
              containerPort: {{ .Values.flask.port }}
              protocol: TCP
          env:
            - name: DEV_MODE
              value: {{ .Values.flask.devMode | quote }}
            - name: CI_COMMIT_BRANCH
              value: {{ .Values.global.branch | quote }}
            - name: FLASK_MSS_BASE_URL
              value: {{ printf "http://%s" $mssName | quote }}
            # Database access goes through PgBouncer.
            - name: PGHOST
              value: {{ $pgbouncerName | quote }}
            - name: PGPORT
              value: {{ .Values.pgbouncer.port | quote }}
            - name: PGUSER
              value: {{ .Values.pg.username | quote }}
            - name: PGDATABASE
              value: {{ .Values.pg.database | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "solver.secretName" . }}
                  key: PG_DB_TOKEN_ADMIN
            - name: PG_DB_TOKEN_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "solver.secretName" . }}
                  key: PG_DB_TOKEN_ADMIN
            - name: API_SOLVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "solver.secretName" . }}
                  key: API_SOLVER_TOKEN
            - name: URBANOPT_REPORTING_FREQUENCY
              value: {{ .Values.flask.urbanopt.reportingFrequency | quote }}
            - name: URBANOPT_RESAMPLE
              value: {{ .Values.flask.urbanopt.resample | quote }}
            - name: URBANOPT_POSTPROCESS_TRANSLATIONS
              value: {{ .Values.flask.urbanopt.postprocessTranslations | quote }}
            - name: URBANOPT_SIMULATION_YEAR
              value: {{ .Values.flask.urbanopt.simulationYear | quote }}
            - name: URBANOPT_DYNAMIC_DEFAULTS
              value: {{ .Values.flask.urbanopt.dynamicDefaults | quote }}
            - name: URBANOPT_KEEP_RUN_DIR
              value: {{ .Values.flask.urbanopt.keepRunDir | quote }}
            {{- range $key, $value := .Values.flask.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          # The HTTP server is up shortly after the 30s settle; gate traffic on a TCP open.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.flask.resources | nindent 12 }}
