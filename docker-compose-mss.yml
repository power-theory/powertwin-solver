services:
  powertwin-solver-pg:
    image: postgres:17
    container_name: powertwin-solver-pg
    environment:
      - POSTGRES_DB=powertwin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_DB_TOKEN_ADMIN}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
    ports:
      - "${PG_DB_PORT}:5432"
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      powertwin-network:
        aliases:
          - postgres-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d powertwin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgbouncer:
    image: pgbouncer/pgbouncer:1.15.0
    container_name: powertwin-pgbouncer
    environment:
      - DATABASES_HOST=postgres-db
      - DATABASES_PORT=5432
      - DATABASES_USER=postgres
      - DATABASES_PASSWORD=${PG_DB_TOKEN_ADMIN}
      - DATABASES_DBNAME=powertwin
      - LISTEN_ADDR=0.0.0.0
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
      - MAX_DB_CONNECTIONS=100
      - ADMIN_USERS=postgres
      - STATS_USERS=postgres
      - LOG_CONNECTIONS=1
      - LOG_DISCONNECTIONS=1
      - LOG_POOLER_ERRORS=1
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,application_name
    ports:
      - "6432:6432"
    depends_on:
      powertwin-solver-pg:
        condition: service_healthy
    restart: unless-stopped
    networks:
      powertwin-network:
        aliases:
          - pgbouncer-db
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  powertwin-solver-flask:
    container_name: powertwin-solver-flask
    build: 
      context: ./solver
    command: ["sh", "-c", "sleep 30 && python run.py"]
    ports:
      - "${FLASK_PORT}:8080"
    environment:
      - FLASK_MSS_BASE_URL=${FLASK_MSS_BASE_URL}
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
      - CI_COMMIT_BRANCH=${CI_COMMIT_BRANCH}
      - PGHOST=pgbouncer-db
      - PGPORT=6432
      - PGUSER=postgres
      - PGPASSWORD=${PG_DB_TOKEN_ADMIN}
      - PGDATABASE=powertwin
      - REPORTING_FREQUENCY=${REPORTING_FREQUENCY:-Timestep}
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
    depends_on:
      pgbouncer:
        condition: service_healthy
    tty: true 
    restart: unless-stopped
    networks:
      - powertwin-network

  powertwin-solver-mss:
    container_name: powertwin-solver-mss
    build: 
      context: ./mss
    ports:
      - "${MSS_PORT}:8080"
    environment:
      - MSS_FLASK_BASE_URL=${MSS_FLASK_BASE_URL}
      - MSS_SLACK_VERIFICATION_TOKEN=${MSS_SLACK_VERIFICATION_TOKEN}
      - MSS_SLACK_SIGNING_SECRET=${MSS_SLACK_SIGNING_SECRET}
      - MSS_SLACK_WEBHOOK_URL=${MSS_SLACK_WEBHOOK_URL}
      - MSS_SLACK_CHANNEL=${MSS_SLACK_CHANNEL}
      - PG_DB_TOKEN_ADMIN=${PG_DB_TOKEN_ADMIN}
      - FLASK_PORT=${FLASK_PORT}
    depends_on:
      - powertwin-solver-pg
    links:
      - powertwin-solver-pg
    restart: unless-stopped
    networks:
      - powertwin-network

volumes:
  powertwin-solver-flask:
  postgres_data:
  powertwin_data:

networks:
  powertwin-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_dns: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"