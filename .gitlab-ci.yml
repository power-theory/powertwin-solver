# PowerTwin Solver - GitLab CI/CD Pipeline
# dev branch -> test + build + deploy to dev (staging)
# main branch -> test + build + deploy to main + demo -> mirror
#
# Required CI/CD variables:
#   AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (AWS_ACCOUNT_ID is derived)
#   GITHUB_PUSH_TOKEN (PAT with repo scope for GitHub mirror)
#   PG_DB_TOKEN_ADMIN, API_SOLVER_TOKEN, PG_DB_PASSWORD (main app PG password, for KEDA)
#   MSS_SLACK_VERIFICATION_TOKEN, MSS_SLACK_SIGNING_SECRET, MSS_SLACK_WEBHOOK_URL

stages:
  - test
  - build
  - deploy
  - mirror

variables:
  AWS_REGION: ${AWS_REGION}
  DOMAIN_NAME: ${DOMAIN_NAME}
  IMAGE_TAG: ${CI_COMMIT_BRANCH}-${CI_COMMIT_SHORT_SHA}
  HELM_CHART: k8s/helm/${CI_PROJECT_NAME}
  HELM_RELEASE: ${CI_PROJECT_NAME}
  K8S_NAMESPACE: powertwin-${CI_COMMIT_BRANCH}

# Test

test_resolvers:
  stage: test
  image: python:3.10-slim
  tags:
    - k8s
  script:
    - pip install -r solver/requirements.txt --quiet
    - python tests/test_resolvers.py
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(dev|main)$/

# Build

.ecr_login: &ecr_login
  - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
  - export ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
  - aws ecr get-login-password --region ${AWS_REGION}
      | docker login --username AWS --password-stdin ${ECR_REGISTRY}

.build_template:
  stage: build
  needs: [test_resolvers]
  image: docker:26.1.4
  tags:
    - k8s
  before_script:
    # -u expat: docker:26.1.4 ships an expat too old for aws-cli's pyexpat (relocation crash)
    - apk add --no-cache -u aws-cli expat
    - *ecr_login
  after_script:
    - docker image prune -f
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(dev|main)$/

build_flask:
  extends: .build_template
  script:
    - docker build -t ${ECR_REGISTRY}/${CI_PROJECT_NAME}-flask:${IMAGE_TAG}
        -t ${ECR_REGISTRY}/${CI_PROJECT_NAME}-flask:${CI_COMMIT_BRANCH}
        -f ./solver/Dockerfile ./solver
    - docker push ${ECR_REGISTRY}/${CI_PROJECT_NAME}-flask --all-tags

build_pgbouncer:
  extends: .build_template
  script:
    - docker build -t ${ECR_REGISTRY}/${CI_PROJECT_NAME}-pgbouncer:${IMAGE_TAG}
        -t ${ECR_REGISTRY}/${CI_PROJECT_NAME}-pgbouncer:${CI_COMMIT_BRANCH}
        ./pgbouncer
    - docker push ${ECR_REGISTRY}/${CI_PROJECT_NAME}-pgbouncer --all-tags

build_mss:
  extends: .build_template
  script:
    - docker build -t ${ECR_REGISTRY}/${CI_PROJECT_NAME}-mss:${IMAGE_TAG}
        -t ${ECR_REGISTRY}/${CI_PROJECT_NAME}-mss:${CI_COMMIT_BRANCH}
        ./mss
    - docker push ${ECR_REGISTRY}/${CI_PROJECT_NAME}-mss --all-tags

# Deploy

.deploy_template:
  stage: deploy
  image:
    name: alpine/helm:3.21.2
    entrypoint: [""]   # override helm entrypoint so the shell script runs
  tags:
    - k8s
  before_script:
    - apk add --no-cache aws-cli kubectl jq
    - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - export ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
    - export CLUSTER_NAME=${CLUSTER_NAME:-powertwin}
    - aws eks update-kubeconfig --name ${CLUSTER_NAME} --region ${AWS_REGION}
    - |
      jq -n \
        --arg pgAdminToken "${PG_DB_TOKEN_ADMIN}" \
        --arg apiSolverToken "${API_SOLVER_TOKEN}" \
        --arg slackVerificationToken "${MSS_SLACK_VERIFICATION_TOKEN:-}" \
        --arg slackSigningSecret "${MSS_SLACK_SIGNING_SECRET:-}" \
        --arg slackWebhookUrl "${MSS_SLACK_WEBHOOK_URL:-}" \
        --arg mainPgPassword "${PG_DB_PASSWORD:-}" \
        '{secrets: {
          pgAdminToken: $pgAdminToken,
          apiSolverToken: $apiSolverToken,
          slackVerificationToken: $slackVerificationToken,
          slackSigningSecret: $slackSigningSecret,
          slackWebhookUrl: $slackWebhookUrl,
          mainPgPassword: $mainPgPassword
        }}' > /tmp/secrets.json

deploy_dev:
  extends: .deploy_template
  script:
    - helm upgrade --install ${HELM_RELEASE} ${HELM_CHART}
        --namespace ${K8S_NAMESPACE}
        --create-namespace
        -f ${HELM_CHART}/values-${CI_COMMIT_BRANCH}.yaml
        -f /tmp/secrets.json
        --set global.imageRegistry=${ECR_REGISTRY}
        --set global.imageTag=${IMAGE_TAG}
        --set global.branch=${CI_COMMIT_BRANCH}
        --atomic
        --wait
        --timeout 10m
  environment:
    name: ${K8S_NAMESPACE}
    url: https://dev-solver.${DOMAIN_NAME}
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

deploy_main:
  extends: .deploy_template
  script:
    - helm upgrade --install ${HELM_RELEASE} ${HELM_CHART}
        --namespace ${K8S_NAMESPACE}
        --create-namespace
        -f ${HELM_CHART}/values-${CI_COMMIT_BRANCH}.yaml
        -f /tmp/secrets.json
        --set global.imageRegistry=${ECR_REGISTRY}
        --set global.imageTag=${IMAGE_TAG}
        --set global.branch=${CI_COMMIT_BRANCH}
        --atomic
        --wait
        --timeout 10m
  environment:
    name: ${K8S_NAMESPACE}
    url: https://solver.${DOMAIN_NAME}
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

