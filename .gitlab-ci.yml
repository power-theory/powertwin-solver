stages:
  - build
  - deploy

image: tmaier/docker-compose:1.29

build:
  stage: build
  script:
    - echo "Building Docker images..."
    - docker compose -f docker-compose.yml build --no-cache
  cache:
    paths: []

deploy:
  stage: deploy
  script:
    - echo "Deploying Docker containers..."
    - docker compose -f docker-compose.yml up -d