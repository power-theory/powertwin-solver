<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerTwin Solver API Tester</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="icon" href="static/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <h1>PowerTwin Solver API Tester</h1>

        <div class="tabs">
            <button type="button" onclick="autorunSimulation()">Autorun Simulation</button>
            <button type="button" onclick="stopSimulation()">Kill Simulation</button>
            <a href="/logs"><button>Logs</button></a>
        </div>

        <div id="simulation" class="tab active">
            
            <div class="form-section">
                <h2>Full Simulation Run</h2>
                <form id="full-simulation-form">
                    <label for="startsim_asset_geojson_file">Upload Asset GeoJSON File:</label>
                    <input type="file" id="startsim_asset_geojson_file" name="startsim_asset_geojson_file"><br>

                    <label for="startsim_metadata_csv_file">Upload Metadata CSV File:</label>
                    <input type="file" id="startsim_metadata_csv_file" name="startsim_metadata_csv_file"><br>

                    <label for="show-configuration-settings">Adjust Feature File Configuration</label>
                    <input type="checkbox" id="show-configuration-settings" name="show_configuration_settings" onclick="toggleConfigurationSettings()"><br>

                    <div id="configuration-settings" style="display: none;">
                        <label for="weekday_start_time">Weekday Start Time:</label>
                        <input type="time" id="weekday_start_time" name="weekday_start_time" value="08:00"><br>

                        <label for="weekday_duration">Weekday Duration (HH:MM):</label>
                        <input type="text" id="weekday_duration" name="weekday_duration" value="10:00"><br>

                        <label for="weekend_start_time">Weekend Start Time:</label>
                        <input type="time" id="weekend_start_time" name="weekend_start_time" value="10:00"><br>

                        <label for="weekend_duration">Weekend Duration (HH:MM):</label>
                        <input type="text" id="weekend_duration" name="weekend_duration" value="8:00"><br>

                        <label for="system_type">System Type:</label>
                        <select class="system_type" name="system_type">
                            <!-- Options will be populated by JavaScript -->
                        </select><br>

                        <label for="heating_system_fuel_type">Heating System Fuel Type:</label>
                        <input type="text" id="heating_system_fuel_type" name="heating_system_fuel_type" value="electricity" readonly><br>

                        <label for="wall_material">Wall Material:</label>
                        <input type="text" id="wall_material" name="constructions.wall.material" value="Super Insulated" readonly><br>

                        <label for="wall_r_value">Wall R-Value:</label>
                        <input type="number" id="wall_r_value" name="constructions.wall.r_value" value="15.0"><br>

                        <label for="roof_material">Roof Material:</label>
                        <input type="text" id="roof_material" name="constructions.roof.material" value="Super Insulated" readonly><br>

                        <label for="roof_r_value">Roof R-Value:</label>
                        <input type="number" id="roof_r_value" name="constructions.roof.r_value" value="15.0"><br>
                    </div>

                    <label for="startsim_num_cores">Number of Cores:</label>
                    <input type="number" id="startsim_num_cores" name="startsim_num_cores" value="1"><br>

                    <label for="startsim_hpc_mode">Enable HPC Multi-node Execution:</label>
                    <input type="checkbox" id="startsim_hpc_mode" name="startsim_hpc_mode" onchange="toggleHpcSettings()"><br>

                    <div id="hpc-settings" style="display: none;">
                        <label for="startsim_shared_storage">Shared Storage Path:</label>
                        <input type="text" id="startsim_shared_storage" name="startsim_shared_storage" placeholder="Path to shared storage for HPC mode"><br>
                    </div>

                    <label for="startsim_simulation_name">Simulation Name:</label>
                    <input type="text" id="startsim_simulation_name" name="startsim_simulation_name"><br>

                    <label for="startsim_keep_dirs">Keep Additional Directories:</label>
                    <input type="checkbox" id="startsim_keep_dirs" name="startsim_keep_dirs" title="Keep feature_reports and generated_files directories during asset cleanup"><br>

                    <button type="button" onclick="startSimulation()">Start Full Simulation</button>
                </form>
            </div>

            <div class="form-section">
                <h2>Recover Simulation (Or Batch)</h2>
                <form id="recovery-form">
                    <label for="corrupted_simulation_name">Corrupted Simulation Name:</label>
                    <input type="text" id="corrupted_simulation_name" name="corrupted_simulation_name"><br>
                    <label for="recover_batch_id">Corrupted Batch ID (Optional):</label>
                    <input type="text" id="recover_batch_id" name="recover_batch_id"><br>
                    <label for="recover_simulation_name">Recovery Simulation Name:</label>
                    <input type="text" id="recover_simulation_name" name="recover_simulation_name"><br>
                    <label for="recover_num_cores">Number of Cores:</label>
                    <input type="number" id="recover_num_cores" name="recover_num_cores" value="1"><br>
                    
                    <label for="recover_keep_dirs">Keep Additional Directories:</label>
                    <input type="checkbox" id="recover_keep_dirs" name="recover_keep_dirs" title="Keep feature_reports and generated_files directories during asset cleanup"><br>
                    
                    <button type="button" onclick="recoverSimulation()">Recover</button>
                </form>
            </div>

            <div class="form-section">
                <h2>Print Simulation Status (in Console)</h2>
                <form id="status-form">
                    <label for="status_simulation_name">Simulation Name:</label>
                    <input type="text" id="status_simulation_name" name="status_simulation_name"><br>
                    <label for="status_batch_id">Batch ID (Optional):</label>
                    <input type="int" id="status_batch_id" name="status_batch_id"><br>
                    <button type="button" onclick="getSimulationStatus()">Get Simulation Status</button>
                </form>
            </div>
            
            <div class="form-section">
                <h2>Delete Simulation</h2>
                <form id="delete-form">
                    <label for="delete_simulation_name">Simulation Name:</label>
                    <input type="text" id="delete_simulation_name" name="delete_simulation_name"><br>
                    <button type="button" onclick="deleteSimulation()">Delete Simulation</button>
                </form>
            </div>



            <div class="form-section">
                <h2>Download Asset Feature File</h2>
                <form id="get-config-form">
                    <label for="get_asset_id_config">Asset ID:</label>
                    <input type="text" id="get_asset_id_config" name="get_asset_id_config"><br>
                    <label for="get_simulation_name_config">Simulation Name:</label>
                    <input type="text" id="get_simulation_name_config" name="get_simulation_name_config"><br>
                    <button type="button" onclick="getAssetConfig()">Get Configuration</button>
                </form>
            </div>



        </div>
    </div>

    <script src="static/index.js"></script>
</body>
</html>
