<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Logs</title>
        <link rel="icon" href="static/favicon.ico" type="image/x-icon">
        <style>
            body {
                background-color: #121212;
                color: #ffffff;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }

            .container {
                display: grid;
                grid-template-rows: auto 1fr;
                width: 100%;
                max-width: 1500px;
                min-height: 50vh;
                padding: 20px;
                background-color: #1e1e1e;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
                overflow-y: auto;
                text-align: left;
                position: relative;
            }

            h1 {
                color: #007bff;
                text-align: center;
            }

            pre {
                background-color: #2d2d2d;
                padding: 20px;
                border-radius: 5px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
                width: 100%;
                max-height: 70vh;
                height: 70vh; 
                overflow-y: auto;
            }

            .btn-container {
                position: absolute;
                top: 20px;
                right: 20px;
                display: flex;
                gap: 10px; 
            }

            .btn {
                padding: 5px 10px;
                font-size: 14px; 
                color: #ffffff;
                background-color: #007bff;
                border: none;
                border-radius: 5px;
                text-decoration: none;
                text-align: center;
                cursor: pointer;
            }

            .btn:hover {
                background-color: #0056b3;
            }
        </style>
    </head>
<body>
    <div class="container">
        <div class="btn-container">
            <a href="/" class="btn">Home</a>
            <a href="/logs" class="btn">Refresh</a>
        </div>
        <h1>Logs</h1>
        <pre>{{ logs }}</pre>
    </div>
</body>
</html>
