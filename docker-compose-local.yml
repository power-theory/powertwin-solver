services:
  powertwin-solver-pg:
    image: postgres:17
    container_name: powertwin-solver-pg
    environment:
      - POSTGRES_DB=powertwin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_DB_TOKEN_ADMIN}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      powertwin-network:
        aliases:
          - postgres-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d powertwin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  powertwin-solver-flask:
    container_name: powertwin-solver-flask
    build:
      context: ./solver
    command: ["sh", "-c", "sleep 30 && python run.py"]
    ports:
      - "127.0.0.1:${FLASK_PORT}:8080"
    volumes:
      - ./powertwin_data:/solver/powertwin-solver-pg
    depends_on:
      powertwin-solver-pg:
        condition: service_healthy
    environment:
      - PGHOST=postgres-db
      - PGPORT=${PG_DB_PORT}
      - PGUSER=postgres
      - PGPASSWORD=${PG_DB_TOKEN_ADMIN}
      - PGDATABASE=powertwin
      - REPORTING_FREQUENCY=${REPORTING_FREQUENCY:-Timestep}
    tty: true
    restart: unless-stopped
    networks:
      - powertwin-network

volumes:
  powertwin-solver-flask:
  postgres_data:
  powertwin_data:

networks:
  powertwin-network:
    name: powertwin-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_dns: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"